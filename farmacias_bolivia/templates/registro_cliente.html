{% extends "base.html" %}

{% block title %}Registro de Cliente - Farmacias Bolivia{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-user-plus"></i> Registro de Cliente</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('registro_cliente') }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-id-card"></i> CI (Cédula de Identidad) *
                                </label>
                                <input type="text" class="form-control" name="ci" 
                                       placeholder="Ej: 123456789" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-envelope"></i> Email *
                                </label>
                                <input type="email" class="form-control" name="email" 
                                       placeholder="correo@ejemplo.com" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-user"></i> Nombre *
                                </label>
                                <input type="text" class="form-control" name="nombre" 
                                       placeholder="Nombre" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-user"></i> Apellido Paterno *
                                </label>
                                <input type="text" class="form-control" name="apellido_paterno" 
                                       placeholder="Apellido Paterno" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-user"></i> Apellido Materno
                                </label>
                                <input type="text" class="form-control" name="apellido_materno" 
                                       placeholder="Apellido Materno">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-phone"></i> Teléfono
                                </label>
                                <input type="tel" class="form-control" name="telefono" 
                                       placeholder="Ej: 71234567">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-map-marker-alt"></i> Dirección
                                </label>
                                <input type="text" class="form-control" name="direccion" 
                                       placeholder="Calle, número, zona">
                            </div>
                        </div>
                        
                        <div class="alert alert-info small mt-3">
                            <i class="fas fa-info-circle"></i> 
                            Al registrarte aceptas nuestros <a href="#" class="alert-link">términos y condiciones</a>.
                            No compartiremos tu información con terceros.
                        </div>
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-check-circle"></i> Registrarme
                            </button>
                            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Ya tengo cuenta
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
